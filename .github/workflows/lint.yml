name: lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        run: npm run lint
